databaseChangeLog:
  - changeSet:
      id: create-students-courses-table-003
      author: namiqmahammadov
      changes:
        - createTable:
            tableName: students_courses
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: student_id
                  type: Long
                  constraints:
                    nullable: false

              - column:
                  name: course_id
                  type: Long
                  constraints:
                    nullable: false
                    

              
