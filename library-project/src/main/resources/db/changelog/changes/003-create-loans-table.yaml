databaseChangeLog:
  - changeSet:
      id: create-loans-table-003
      author: namiqmahammadov
      changes:
        - createTable:
            tableName: loans
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false   # ❗ vacib

              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false   # ❗ vacib

              - column:
                  name: borrow_date
                  type: DATE
                  constraints:
                    nullable: false   # ❗ vacib

              - column:
                  name: due_date
                  type: DATE
                  constraints:
                    nullable: false   # ❗ vacib

              - column:
                  name: return_date
                  type: DATE

              - column:
                  name: is_returned
                  type: BOOLEAN
                  defaultValueBoolean: false   # ❗ builder ilə uyğun olsun
                  constraints:
                    nullable: false