databaseChangeLog:
  - changeSet:
      id: create-books-table-002
      author: namiqmahammadov
      changes:
        - createTable:
            tableName: books
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: author
                  type: VARCHAR(60)
                  constraints:
                    nullable: false

              - column:
                  name: isbn
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: total_copies
                  type: INTEGER
                  constraints:
                    nullable: false

              - column:
                  name: available_copies
                  type: INTEGER
                  constraints:
                    nullable: false

              - column:
                  name: category
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false