  databaseChangeLog:
    - changeSet:
        id: 0
        author: admin
        changes:
          - createTable:
              tableName: products
              columns:
                - column:
                    name: id
                    type: BIGSERIAL
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: name
                    type: VARCHAR(255)
                - column:
                    name: price
                    type: DECIMAL(10,2)
                - column:
                    name: quantity
                    type: int
                - column:
                    name:
                    type: TIMESTAMP
                    defaultValueComputed: CURRENT_TIMESTAMP



